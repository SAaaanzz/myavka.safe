<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Лоты — Myavka.safe</title>
  <meta name="description" content="Список лотов и предложений выбранной категории на Myavka.safe — сравнивайте цены и продавцов под защитой эскроу." />
  <meta property="og:title" content="Лоты — Myavka.safe" />
  <meta property="og:description" content="Предложения продавцов по выбранной категории — сделки под защитой эскроу-гаранта Myavka.safe." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Myavka.safe" />
  <meta name="twitter:card" content="summary" />
  <script src="js/theme-init.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Archivo:wdth,wght@100..125,500..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-mark">M</span>Myavka<span class="safe">.safe</span></a>
      <nav class="nav">
        <a href="index.html" data-i18n="nav.home">Главная</a>
        <a href="catalog.html" class="active" data-i18n="nav.catalog">Каталог</a>
        <a href="chats.html" data-i18n="nav.chats">Чаты</a>
        <a href="blacklist.html" data-i18n="nav.blacklist">Чёрный список</a>
        <a href="faq.html" data-i18n="nav.faq">FAQ</a>
      </nav>
      <div class="header-controls">
        <select class="lang-select" id="lang-select">
          <option value="ru">RU</option>
          <option value="kz">KZ</option>
          <option value="en">EN</option>
        </select>
        <button class="theme-toggle" id="theme-toggle" aria-label="Тема">☀</button>
        <a href="#" class="btn btn-tg" data-i18n="nav.login">Войти через Telegram</a>
      </div>
    </div>
  </header>

  <div class="container crumbs">
    <a href="catalog.html" data-i18n="nav.catalog">Каталог</a>
    <span class="sep">/</span>
    <a href="catalog.html" id="crumb-game">…</a>
    <span class="sep">/</span>
    <span class="here" id="crumb-cat">…</span>
  </div>

  <div class="container page-head" style="padding-top:14px">
    <h1 id="lots-title">…</h1>
    <p id="lots-desc"></p>
  </div>

  <div class="container">
    <div class="cat-tabs" id="cat-tabs"></div>

    <div class="filter-bar">
      <div class="search" style="flex:1;min-width:200px"><input type="text" data-i18n-ph="lots.searchPh" placeholder="Поиск в этой категории" /></div>
      <select class="filter">
        <option data-i18n="lots.sortPop">Сортировка: популярные</option>
        <option data-i18n="lots.sortAsc">Цена: по возрастанию</option>
        <option data-i18n="lots.sortDesc">Цена: по убыванию</option>
        <option data-i18n="lots.sortRate">Рейтинг продавца</option>
      </select>
      <input class="filter filter-num" type="text" data-i18n-ph="lots.priceFrom" placeholder="Цена от, ₸" />
      <input class="filter filter-num" type="text" data-i18n-ph="lots.priceTo" placeholder="Цена до, ₸" />
      <label class="filter-check"><input type="checkbox" /> <span data-i18n="lots.online">Онлайн</span></label>
      <label class="filter-check"><input type="checkbox" /> <span data-i18n="lots.verified">Верифицирован</span></label>
    </div>

    <div class="lot-list" id="lots-page"></div>
  </div>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="copy" data-i18n="footer.copy">© 2026 Myavka.safe — все права защищены</div>
    </div>
  </footer>
  <script src="js/app.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
