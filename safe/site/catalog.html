<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог — Myavka.safe</title>
  <script>document.documentElement.dataset.theme = localStorage.getItem("theme") === "light" ? "light" : "dark";</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Archivo:wdth,wght@100..125,500..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-mark">M</span>Myavka<span class="safe">.safe</span></a>
      <nav class="nav">
        <a href="index.html" data-i18n="nav.home">Главная</a>
        <a href="catalog.html" class="active" data-i18n="nav.catalog">Каталог</a>
        <a href="chats.html" data-i18n="nav.chats">Чаты</a>
        <a href="blacklist.html" data-i18n="nav.blacklist">Чёрный список</a>
        <a href="faq.html" data-i18n="nav.faq">FAQ</a>
      </nav>
      <div class="header-controls">
        <select class="lang-select" id="lang-select">
          <option value="ru">RU</option>
          <option value="kz">KZ</option>
          <option value="en">EN</option>
        </select>
        <button class="theme-toggle" id="theme-toggle" aria-label="Тема">☀</button>
        <a href="#" class="btn btn-tg" data-i18n="nav.login">Войти через Telegram</a>
      </div>
    </div>
  </header>

  <div class="container page-head">
    <h1 data-i18n="cat.title">Каталог</h1>
    <p data-i18n="cat.sub">Выберите сервис или сразу нужную услугу</p>
  </div>

  <div class="container">
    <div class="catalog-toolbar">
      <div class="search"><input type="text" data-i18n-ph="cat.searchPh" placeholder="Поиск по всему каталогу — например, «алмазы Mobile Legends»" /></div>
      <a href="#" class="btn btn-primary" data-i18n="cat.createLot">+ Создать лот</a>
    </div>

    <div class="svc-grid" id="catalog-page"></div>
  </div>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="copy" data-i18n="footer.copy">© 2026 Myavka.safe — все права защищены</div>
    </div>
  </footer>
  <script src="js/app.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
